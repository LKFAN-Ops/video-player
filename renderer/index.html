<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>双语字幕播放器</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <!-- ============ 顶部工具栏 ============ -->
  <header class="toolbar">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-name">双语字幕播放器</span>
    </div>

    <div class="tool-group">
      <button id="openVideo" class="btn btn-primary" title="打开本地视频">
        <svg viewBox="0 0 24 24" class="ic"><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm6 3v8l6-4-6-4Z"/></svg>
        打开视频
      </button>
      <button id="openSubtitle" class="btn" title="加载本地字幕文件">
        <svg viewBox="0 0 24 24" class="ic"><path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Zm2 9h5v2H6v-2Zm0-4h12v2H6v-2Zm9 4h3v2h-3v-2Z"/></svg>
        加载字幕
      </button>
    </div>

    <div class="tool-divider"></div>

    <div class="tool-group">
      <select id="genLang" class="select" title="生成字幕时使用的源语言">
        <option value="auto">自动识别</option>
        <option value="en">英语</option>
        <option value="zh">中文</option>
        <option value="ru">俄语</option>
      </select>
      <button id="generate" class="btn" title="用 Whisper 转写整段视频生成字幕">
        <svg viewBox="0 0 24 24" class="ic"><path d="M12 3a4 4 0 0 1 4 4v4a4 4 0 0 1-8 0V7a4 4 0 0 1 4-4Zm-7 8h2a5 5 0 0 0 10 0h2a7 7 0 0 1-6 6.92V21h-2v-3.08A7 7 0 0 1 5 11Z"/></svg>
        生成字幕
      </button>
      <label class="switch" title="后台转写整片并缓存：已处理区域跳转零延迟，二次打开秒出字幕">
        <input type="checkbox" id="realtimeToggle" />
        <span class="switch-track"><span class="switch-thumb"></span></span>
        <span class="switch-label">自动字幕</span>
      </label>
    </div>

    <div class="tool-divider"></div>

    <div class="tool-group">
      <select id="displayLang" class="select" title="字幕显示模式">
        <option value="src">原文</option>
        <option value="zh">中文</option>
        <option value="ru">俄语</option>
        <option value="zh-ru" selected>双语 (中/俄)</option>
      </select>
      <button id="toZh" class="btn btn-ghost">译中文</button>
      <button id="toRu" class="btn btn-ghost">译俄语</button>
    </div>

    <div class="tool-divider"></div>

    <div class="tool-group">
      <label class="chk" title="按视频原始分辨率显示（不缩放）">
        <input type="checkbox" id="rawModeToggle" /> <span>原画</span>
      </label>
      <label class="chk" title="盖住原片烧录在画面上的字幕，再叠加实时翻译">
        <input type="checkbox" id="deSubToggle" /> <span>去原片字幕</span>
      </label>
    </div>

    <div class="tool-divider"></div>

    <div class="tool-group">
      <button id="saveSrt" class="btn">保存字幕</button>
      <button id="exportVideo" class="btn">导出视频</button>
      <button id="removeHardSub" class="btn btn-accent" title="GPU 商业级去除原片烧录的硬字幕，输出干净视频">
        <svg viewBox="0 0 24 24" class="ic"><path d="M12 2 3 7v6c0 5 3.8 8.7 9 9.9 5.2-1.2 9-4.9 9-9.9V7l-9-5Zm-1.4 13.4-3.5-3.5 1.4-1.4 2.1 2.1 4.6-4.6 1.4 1.4-6 6Z"/></svg>
        去字幕(GPU)
      </button>
    </div>

    <span id="status" class="status"></span>
  </header>

  <!-- ============ 播放区域 ============ -->
  <main class="stage">
    <div class="player" id="player">
      <video id="video" playsinline></video>

      <!-- 去原片硬字幕遮罩 -->
      <div id="subMask">
        <div class="mask-hint">拖动移动 · 右下角缩放 · 对准原片字幕</div>
        <div class="mask-handle"></div>
      </div>

      <!-- 翻译字幕叠加层 -->
      <div id="overlay" aria-live="polite"></div>

      <!-- 中央大播放按钮（暂停时） -->
      <button id="centerPlay" class="center-play" aria-label="播放">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5Z"/></svg>
      </button>

      <!-- 拖拽提示（无视频时） -->
      <div id="dropHint" class="drop-hint">
        <svg viewBox="0 0 24 24"><path d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3 1.4 1.42L12 17.41 6.3 11.7l1.4-1.42 3.3 3.3V4a1 1 0 0 1 1-1Zm-7 15h14v2H5v-2Z"/></svg>
        <p>打开或拖入视频开始播放</p>
      </div>

      <!-- ============ 自定义控制条 ============ -->
      <div id="controls" class="controls">
        <div class="seek" id="seek">
          <div class="seek-buffered" id="seekBuffered"></div>
          <div class="seek-played" id="seekPlayed"></div>
          <div class="seek-thumb" id="seekThumb"></div>
          <div class="seek-tooltip" id="seekTooltip">00:00</div>
        </div>

        <div class="ctrl-row">
          <div class="ctrl-left">
            <button id="playBtn" class="cbtn" title="播放/暂停 (空格)">
              <svg class="ic-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7L8 5Z"/></svg>
              <svg class="ic-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6V5Zm8 0h4v14h-4V5Z"/></svg>
            </button>

            <div class="vol">
              <button id="muteBtn" class="cbtn" title="静音 (M)">
                <svg class="ic-vol" viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9H4Zm12.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4Zm-2.5 7.7v2A8 8 0 0 0 14 4.3v2a6 6 0 0 1 0 13.4Z"/></svg>
                <svg class="ic-mute" viewBox="0 0 24 24"><path d="M4 9v6h4l5 5V4L8 9H4Zm15.5 3 2.3-2.3-1.4-1.4-2.3 2.3-2.3-2.3-1.4 1.4 2.3 2.3-2.3 2.3 1.4 1.4 2.3-2.3 2.3 2.3 1.4-1.4-2.3-2.3Z"/></svg>
              </button>
              <input type="range" id="volSlider" class="vol-slider" min="0" max="1" step="0.01" value="1" title="音量" />
            </div>

            <span class="time"><span id="curTime">00:00</span> / <span id="durTime">00:00</span></span>
          </div>

          <div class="ctrl-right">
            <div class="speed">
              <button id="speedBtn" class="cbtn cbtn-text" title="播放速度">1.0x</button>
              <div class="speed-menu" id="speedMenu">
                <button data-rate="0.5">0.5x</button>
                <button data-rate="0.75">0.75x</button>
                <button data-rate="1" class="active">1.0x 正常</button>
                <button data-rate="1.25">1.25x</button>
                <button data-rate="1.5">1.5x</button>
                <button data-rate="2">2.0x</button>
              </div>
            </div>
            <button id="fullscreenBtn" class="cbtn" title="全屏 (F)">
              <svg class="ic-fs" viewBox="0 0 24 24"><path d="M4 4h6v2H6v4H4V4Zm10 0h6v6h-2V6h-4V4ZM4 14h2v4h4v2H4v-6Zm14 0h2v6h-6v-2h4v-4Z"/></svg>
              <svg class="ic-fs-exit" viewBox="0 0 24 24"><path d="M8 4h2v6H4V8h4V4Zm6 0h2v4h4v2h-6V4ZM4 14h6v6H8v-4H4v-2Zm10 0h6v2h-4v4h-2v-6Z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="./srt.js"></script>
  <script src="./translate.js"></script>
  <script src="./renderer.js"></script>
  <script src="./controls.js"></script>
</body>
</html>
